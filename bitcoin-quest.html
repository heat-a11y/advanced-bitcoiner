<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bitcoin Quest — Phase 5: Level Progression</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>\u20BF</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0b1a;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; font-family: 'Press Start 2P', monospace;
      overflow: hidden; user-select: none;
    }

    #gameWrap {
      position: relative;
      max-width: 640px; width: 100%;
      border: 2px solid rgba(247,147,26,.25);
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(247,147,26,.08);
    }

    canvas {
      display: block;
      width: 100%; height: auto;
      aspect-ratio: 640 / 480;
      image-rendering: pixelated; image-rendering: crisp-edges;
      border-radius: 6px;
    }

    /* ─── HUD (overworld only) ─── */
    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 6px 10px;
      display: flex; flex-wrap: wrap; align-items: center;
      pointer-events: none; z-index: 10;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,.8);
      font-size: 9px;
      transition: opacity .3s;
      gap: 2px 6px;
    }
    #hud.hidden { opacity: 0; }
    #hudLeft  { display: flex; align-items: center; gap: 6px; flex: 1; }
    #hudRight { display: flex; align-items: center; gap: 6px; }
    #hudLevelName { width: 100%; text-align: center; font-size: 6px; color: rgba(255,255,255,.3); line-height: 1; }
    .bar-wrap {
      width: 80px; height: 8px;
      background: rgba(0,0,0,.5);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 4px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; width: 100%;
      border-radius: 4px;
      transition: width .25s ease;
    }
    .bar-fill.hp { background: linear-gradient(90deg, #FF4757, #FF6B9D); }
    .bar-fill.xp { background: linear-gradient(90deg, #F7931A, #FFD700); }

    /* ─── MOBILE DPAD ─── */
    #mobileControls {
      display: none;
      position: absolute; bottom: 10px; left: 0; right: 0;
      justify-content: center; z-index: 15;
      pointer-events: none;
      transition: opacity .3s;
    }
    #mobileControls.active { display: flex; }
    #mobileControls.hidden { opacity: 0; }
    .ctrl-dpad {
      display: grid;
      grid-template-columns: repeat(3, 48px);
      gap: 3px;
    }
    .ctrl-btn {
      width: 48px; height: 48px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.06);
      color: #fff; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      pointer-events: auto; cursor: pointer;
      touch-action: none;
    }
    .ctrl-btn:active { background: rgba(247,147,26,.2); }
    .ctrl-dpad .center { visibility: hidden; }
    @media (pointer: coarse) { #mobileControls.active { display: flex; } }

    /* ─── BATTLE OVERLAY ─── */
    #battleUI {
      display: none;
      position: absolute; inset: 0;
      z-index: 20;
      flex-direction: column;
      animation: fadeIn .25s ease;
    }
    #battleUI.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Battle text box at the bottom */
    .battle-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,.88);
      border-top: 2px solid rgba(247,147,26,.25);
      padding: 12px 14px;
      min-height: 110px;
    }
    .battle-log {
      font-size: 9px;
      color: #fff;
      line-height: 1.6;
      min-height: 36px;
      margin-bottom: 8px;
    }
    .battle-log .highlight { color: #F7931A; }
    .battle-log .damage   { color: #FF4757; }
    .battle-log .heal     { color: #00D4AA; }

    .battle-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .battle-btn {
      padding: 10px 16px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      cursor: pointer;
      transition: all .15s;
      flex: 1;
      min-width: 80px;
      text-align: center;
    }
    .battle-btn:hover {
      border-color: rgba(247,147,26,.4);
      background: rgba(247,147,26,.1);
      transform: translateY(-1px);
    }
    .battle-btn:disabled {
      opacity: .3; cursor: default; transform: none;
    }
    .battle-btn.primary {
      background: linear-gradient(135deg, rgba(247,147,26,.2), rgba(255,215,0,.1));
      border-color: rgba(247,147,26,.3);
    }
    .battle-btn.danger {
      border-color: rgba(255,71,87,.25);
      color: #FF6B9D;
    }
    .battle-btn.danger:hover {
      border-color: #FF4757;
      background: rgba(255,71,87,.1);
    }

    /* Item sub-menu */
    .battle-sub {
      display: none;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .battle-sub.active { display: flex; }

    /* Answer buttons (for Attack) */
    .battle-answers {
      display: none;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .battle-answers.active { display: flex; }
    .ans-btn {
      padding: 8px 10px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      cursor: pointer;
      transition: all .15s;
      flex: 1;
      min-width: 70px;
      text-align: center;
      line-height: 1.4;
    }
    .ans-btn:hover {
      border-color: rgba(247,147,26,.4);
      background: rgba(247,147,26,.08);
    }
    .ans-btn:disabled { opacity: .3; cursor: default; }
    .ans-btn.correct {
      border-color: #00D4AA;
      background: rgba(0,212,170,.15);
    }
    .ans-btn.wrong {
      border-color: #FF4757;
      background: rgba(255,71,87,.15);
    }

    .back-btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.1);
      background: transparent;
      color: rgba(255,255,255,.4);
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      cursor: pointer;
      transition: all .15s;
    }
    .back-btn:hover { color: #fff; border-color: rgba(255,255,255,.3); }

    @media (max-width: 420px) {
      #hud { font-size: 7px; padding: 4px 6px; gap: 1px 4px; }
      #hudLeft { gap: 4px; }
      #hudRight { gap: 4px; }
      .bar-wrap { width: 48px; height: 5px; }
      #hudLevelName { font-size: 5px; }
      .ctrl-btn { width: 40px; height: 40px; font-size: .9rem; }
      .ctrl-dpad { grid-template-columns: repeat(3, 40px); }
      .battle-panel { padding: 8px 10px; min-height: 100px; }
      .battle-log { font-size: 7px; }
      .battle-btn { font-size: 7px; padding: 8px 10px; min-width: 60px; }
      .ans-btn { font-size: 6px; padding: 6px 8px; min-width: 55px; }
    }
  </style>
</head>
<body>

<div id="gameWrap">
  <canvas id="canvas" width="640" height="480"></canvas>

  <!-- ─── HUD ─── -->
  <div id="hud">
    <div id="hudLeft">
      <span id="hudLevel" style="color:#F7931A;">Lv.1</span>
      <div class="bar-wrap"><div class="bar-fill hp" id="hudHp" style="width:100%"></div></div>
    </div>
    <div id="hudRight">
      <div class="bar-wrap"><div class="bar-fill xp" id="hudXp" style="width:0%"></div></div>
      <span id="hudScore" style="color:rgba(255,255,255,.4);">0000</span>
    </div>
    <div id="hudLevelName"></div>
  </div>

  <!-- ─── MOBILE DPAD ─── -->
  <div id="mobileControls" class="active">
    <div class="ctrl-dpad">
      <div></div><button class="ctrl-btn" data-dir="up">▲</button><div></div>
      <button class="ctrl-btn" data-dir="left">◀</button><div class="ctrl-btn center"></div><button class="ctrl-btn" data-dir="right">▶</button>
      <div></div><button class="ctrl-btn" data-dir="down">▼</button><div></div>
    </div>
  </div>

  <!-- ─── BATTLE UI ─── -->
  <div id="battleUI">
    <div class="battle-panel">
      <div class="battle-log" id="battleLog">A wild <span class="highlight">Fiat Goon</span> appeared!</div>

      <div class="battle-actions" id="battleActions">
        <button class="battle-btn primary" id="btnAttack" onclick="battleAction('attack')">⚔ Attack</button>
        <button class="battle-btn" id="btnItems" onclick="battleAction('items')">🧪 Items</button>
        <button class="battle-btn danger" id="btnRun" onclick="battleAction('run')">🏃 Run</button>
      </div>

      <div class="battle-sub" id="battleSub">
        <button class="battle-btn" onclick="useItem('potion')">💊 Potion +20 HP</button>
        <button class="battle-btn" onclick="useItem('superpotion')">💉 Super Potion +50 HP</button>
        <button class="back-btn" onclick="hideSubMenu()">← Back</button>
      </div>

      <div class="battle-answers" id="battleAnswers"></div>
    </div>
  </div>
</div>

     Attack mechanic:
       - Correct answer → Power Move (massive damage to enemy)
       - Wrong answer   → Counter Attack (player takes damage)
     
     Progression: 10 levels x 3 zones
       Altcoin Swamp (Lv.1-3) → Fiat Factory (Lv.4-7) → The Citadel (Lv.8-10)
     
     Per level: clear minions → defeat boss → portal opens → next level
     Level 10 boss: Federal Reserve Chairman — defeat to win the game!
     ═══════════════════════════════════════════════════════════════════════ */

    medium: ['Fiat Lackey', 'Tax Collector', 'Debt Collector'],

  };

  function createMinion(level) {
    const tier = level <= 3 ? 'easy' : level <= 7 ? 'medium' : 'hard';
    const pool = MINION_NAMES[tier];
    return {
      name: pool[rand(0, pool.length - 1)],
      hp: 12 + level * 3,
      maxHp: 12 + level * 3,
      attack: 2 + level,
      defense: Math.floor(level / 4),
      xpReward: 8 + level * 2,
      scoreReward: 15 + level * 5,
      tier: tier,
      isMinion: true,
    };
  }

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  function getTile(col, row) {
    const map = LEVELS[state.currentLevel];
    if (row < 0 || row >= map.tiles.length) return 1;
    if (col < 0 || col >= map.tiles[0].length) return 1;
    return map.tiles[row][col];
  }

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ────────────────────────────────────────────────────────────────────
  // MODULE 8: GAME STATE
  // ────────────────────────────────────────────────────────────────────

  const state = {
    mode: 'overworld',

    player: {
      gridX: 1, gridY: 1,
      pixelX: 0, pixelY: 0,
      hp: 40,
      maxHp: 40,
      level: 1,
      attack: 8,
      defense: 2,
    },

    currentLevel: 0,      // 0-indexed into LEVELS
    portalVisible: false,  // true after boss defeated
    xp: 0,
    xpNeeded: 50,
    score: 0,

    keys: {},
    moving: false,
    moveTimer: 0,

    battle: null,
    gameOver: false,
  };

  function currentLevel() { return LEVELS[state.currentLevel]; }

  function loadLevel(levelIndex) {
    if (levelIndex >= LEVELS.length) {
      // Beat the game!
      victory();
      return;
    }
    const lv = LEVELS[levelIndex];
    state.currentLevel = levelIndex;
    state.portalVisible = false;
    state.player.gridX  = lv.playerStart.x;
    state.player.gridY  = lv.playerStart.y;
    state.player.pixelX = lv.playerStart.x * CONFIG.TILE_SIZE;
    state.player.pixelY = lv.playerStart.y * CONFIG.TILE_SIZE;
    state.player.hp = state.player.maxHp; // full heal on level-up
    state.moving = false;
  }


  // ────────────────────────────────────────────────────────────────────
  // MODULE 10: MOVEMENT SYSTEM
  // ────────────────────────────────────────────────────────────────────

  function tryMove(dx, dy) {
    if (state.moving || state.gameOver || state.mode === 'battle') return false;

    const nx = state.player.gridX + dx;
    const ny = state.player.gridY + dy;

    if (getTile(nx, ny) !== 0) return false;

    const lv = currentLevel();
    const enemyHere = lv.enemies.find(e => !e.defeated && e.x === nx && e.y === ny);
    if (enemyHere) {
      startBattle(enemyHere);
      return false;
    }

    // Check portal
    if (state.portalVisible && nx === lv.portalTile.x && ny === lv.portalTile.y) {
      loadLevel(state.currentLevel + 1);
      return false;
    }

    state.player.gridX = nx;
    state.player.gridY = ny;
    state.moving = true;
    state.moveTimer = 0;
    return true;
  }


  // ────────────────────────────────────────────────────────────────────
  // MODULE 11: INPUT HANDLING
  // ────────────────────────────────────────────────────────────────────

  document.addEventListener('keydown', (e) => {
    state.keys[e.key] = true;
    if (state.mode === 'overworld') {
      if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === 'W') tryMove(0, -1);
      if (e.key === 'ArrowDown'  || e.key === 's' || e.key === 'S') tryMove(0,  1);
      if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') tryMove(-1, 0);
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') tryMove(1,  0);
    }
    if (e.key === 'Enter' || e.key === ' ') {
      if (state.mode === 'battle' && !state.battle.answered) {
        // Quick-attack on Enter/Space
        battleAction('attack');
      }
    }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  });
  document.addEventListener('keyup', (e) => { state.keys[e.key] = false; });

  // Mobile D-pad
  document.querySelectorAll('[data-dir]').forEach((btn) => {
    const handler = (e) => {
      e.preventDefault();
      if (state.mode !== 'overworld') return;
      const dir = btn.dataset.dir;
      if (dir === 'up')    tryMove(0, -1);
      if (dir === 'down')  tryMove(0,  1);
      if (dir === 'left')  tryMove(-1, 0);
      if (dir === 'right') tryMove(1,  0);
    };
    btn.addEventListener('touchstart', handler);
    btn.addEventListener('mousedown',  handler);
  });


  // ────────────────────────────────────────────────────────────────────
  // MODULE 12: OVERWORLD RENDERER
  // ────────────────────────────────────────────────────────────────────

  function render() {
    ctx.clearRect(0, 0, W, H);

    if (state.mode === 'overworld') {
      renderMap();
      renderEnemies();
      renderPortal();
      renderPlayer();
      updateHUD();
    } else if (state.mode === 'battle') {
      renderBattle();
    }
  }

  function renderMap() {
    const map = currentLevel();
    for (let r = 0; r < CONFIG.ROWS; r++) {
      for (let c = 0; c < CONFIG.COLS; c++) {
        const x = c * CONFIG.TILE_SIZE;
        const y = r * CONFIG.TILE_SIZE;
        const tile = map.tiles[r][c];
        const h = (c * 7 + r * 13) % 17; // deterministic hash per tile
        const h2 = (c * 11 + r * 5) % 13;

        if (tile === 1) {
          // ── Wall with brick detail ──
          ctx.fillStyle = CONFIG.WALL_COLOR;
          ctx.fillRect(x, y, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);

          // Brick mortar lines
          ctx.fillStyle = 'rgba(0,0,0,.15)';
          ctx.fillRect(x, y + 15, CONFIG.TILE_SIZE, 1);
          if (h % 2 === 0) {
            ctx.fillRect(x, y + 7, CONFIG.TILE_SIZE, 1);
            ctx.fillRect(x, y + 23, CONFIG.TILE_SIZE, 1);
          }
          // Vertical brick seams (alternating)
          ctx.fillRect(x + 15, y + (h % 2 === 0 ? 0 : 14), 1, 16);

          // Top highlight
          ctx.fillStyle = 'rgba(255,255,255,.05)';
          ctx.fillRect(x, y, CONFIG.TILE_SIZE, 2);
          ctx.fillRect(x, y, 2, CONFIG.TILE_SIZE);

          // Moss / vine detail on some walls
          if (h % 4 === 0) {
            ctx.fillStyle = 'rgba(60,160,60,.15)';
            ctx.fillRect(x + 18, y + 4, 3, 6);
            ctx.fillRect(x + 24, y + 6, 2, 4);
          } else if (h % 7 === 0) {
            ctx.fillStyle = 'rgba(100,200,100,.1)';
            ctx.fillRect(x + 4, y + 18, 4, 3);
            ctx.fillRect(x + 8, y + 20, 3, 2);
          }

          // Wall crack
          if (h2 === 0) {
            ctx.fillStyle = 'rgba(0,0,0,.08)';
            ctx.fillRect(x + 10, y + 8, 1, 3);
            ctx.fillRect(x + 11, y + 10, 2, 1);
          }

        } else {
          // ── Floor with varied detail ──
          const isDark = (c + r) % 2 === 0;
          ctx.fillStyle = isDark ? CONFIG.FLOOR_A : CONFIG.FLOOR_B;
          ctx.fillRect(x, y, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);

          // Subtle noise texture
          if (h % 3 === 0) {
            ctx.fillStyle = 'rgba(255,255,255,.02)';
            ctx.fillRect(x + 10 + (h % 5), y + 8 + (h2 % 5), 2, 2);
          }

          // Grass tufts
          if (h === 1 || h === 3 || h === 5) {
            ctx.fillStyle = 'rgba(80,180,80,.2)';
            const gx = x + 6 + (h * 3) % 16;
            const gy = y + 18 + (h2 * 2) % 8;
            ctx.fillRect(gx, gy, 2, 4);
            ctx.fillRect(gx + 3, gy + 1, 2, 3);
          }

          // Small flowers (colored dots)
          if (h === 7 || h === 11) {
            const colors = ['rgba(255,100,150,.3)', 'rgba(255,200,50,.3)', 'rgba(200,100,255,.3)', 'rgba(100,200,255,.3)'];
            ctx.fillStyle = colors[h2 % colors.length];
            const fx = x + 8 + (h * 5) % 12;
            const fy = y + 6 + (h2 * 3) % 12;
            ctx.fillRect(fx, fy, 3, 3);
            ctx.fillRect(fx + 1, fy - 2, 1, 2);
          }

          // Small rocks
          if (h2 === 2 || h2 === 7) {
            ctx.fillStyle = 'rgba(120,120,120,.15)';
            const rx = x + 4 + (h * 3) % 20;
            const ry = y + 20 + (h2 * 2) % 8;
            ctx.fillRect(rx, ry, 3, 2);
            ctx.fillRect(rx + 1, ry - 1, 2, 1);
          }

          // Stone path accent on certain tiles
          if (h % 8 === 0 && isDark) {
            ctx.fillStyle = 'rgba(100,100,80,.08)';
            ctx.fillRect(x + 4, y + 4, 24, 24);
            ctx.fillStyle = 'rgba(80,80,60,.06)';
            ctx.fillRect(x + 6, y + 6, 20, 20);
          }

          // Mushroom (rare)
          if (h === 13 && h2 === 8) {
            ctx.fillStyle = 'rgba(200,150,100,.2)';
            ctx.fillRect(x + 12, y + 22, 3, 5);
            ctx.fillStyle = 'rgba(180,100,180,.15)';
            ctx.fillRect(x + 10, y + 20, 7, 4);
          }
        }
      }
    }
  }

  function renderEnemies() {
    const map = currentLevel();
    map.enemies.forEach(enemy => {
      if (enemy.defeated) return;
      const et = BOSS_TYPES[enemy.type];
      const x = enemy.x * CONFIG.TILE_SIZE;
      const y = enemy.y * CONFIG.TILE_SIZE;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,.25)';
      ctx.beginPath();
      ctx.ellipse(x + 16, y + 28, 9, 3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Boss crown indicator
      if (enemy.boss) {
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#FFD700';
        ctx.fillText('\u{1F451}', x + 16, y - 2);
      }

      // Body
      ctx.fillStyle = et.color;
      ctx.fillRect(x + 8, y + 14, 16, 12);

      // Head
      ctx.fillStyle = et.color;
      ctx.fillRect(x + 10, y + 4, 12, 12);

      // Eyes
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + 12, y + 7, 3, 3);
      ctx.fillRect(x + 17, y + 7, 3, 3);
      ctx.fillStyle = '#222';
      ctx.fillRect(x + 12, y + 7, 2, 2);
      ctx.fillRect(x + 17, y + 7, 2, 2);

      // Mouth
      ctx.fillStyle = '#333';
      ctx.fillRect(x + 13, y + 13, 6, 2);

      // Name tag
      ctx.font = '6px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,.5)';
      ctx.fillText(et.name, x + 16, y - 4);
    });
  }

  function renderPortal() {
    if (!state.portalVisible) return;
    const lv = currentLevel();
    const x = lv.portalTile.x * CONFIG.TILE_SIZE;
    const y = lv.portalTile.y * CONFIG.TILE_SIZE;
    const t = Date.now() / 500;
    const pulse = 0.6 + 0.4 * Math.sin(t);

    // Glow
    ctx.fillStyle = 'rgba(247,147,26,' + (0.15 * pulse) + ')';
    ctx.fillRect(x - 2, y - 2, CONFIG.TILE_SIZE + 4, CONFIG.TILE_SIZE + 4);

    // Portal frame
    ctx.fillStyle = '#F7931A';
    ctx.fillRect(x + 2, y, 28, 2);
    ctx.fillRect(x + 2, y + 30, 28, 2);
    ctx.fillRect(x, y + 2, 2, 28);
    ctx.fillRect(x + 30, y + 2, 2, 28);

    // Swirl
    ctx.fillStyle = 'rgba(255,215,0,' + (0.5 * pulse) + ')';
    for (let i = 0; i < 6; i++) {
      const angle = t + i * 1.047;
      const sx = x + 16 + Math.cos(angle) * 8;
      const sy = y + 16 + Math.sin(angle) * 8;
      ctx.fillRect(sx, sy, 3, 3);
    }

    // Label
    ctx.font = '5px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(247,147,26,' + (0.7 * pulse) + ')';
    ctx.fillText('▶ PORTAL', x + 16, y - 6);
  }

  function renderPlayer() {
    const p = state.player;

    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.beginPath();
    ctx.ellipse(p.pixelX + 16, p.pixelY + 28, 9, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = CONFIG.PLAYER_COLOR;
    ctx.fillRect(p.pixelX + 10, p.pixelY + 14, 12, 10);
    ctx.fillStyle = 'rgba(255,255,255,.12)';
    ctx.fillRect(p.pixelX + 12, p.pixelY + 16, 4, 6);

    ctx.fillStyle = '#F5C89A';
    ctx.beginPath();
    ctx.arc(p.pixelX + 16, p.pixelY + 9, 7, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#222';
    ctx.fillRect(p.pixelX + 12, p.pixelY + 7, 2, 2);
    ctx.fillRect(p.pixelX + 18, p.pixelY + 7, 2, 2);

    ctx.fillStyle = '#2C3E50';
    ctx.fillRect(p.pixelX + 10, p.pixelY + 24, 5, 6);
    ctx.fillRect(p.pixelX + 17, p.pixelY + 24, 5, 6);

    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.fillText('\u20BF', p.pixelX + 16, p.pixelY + 4);
  }

  function updateHUD() {
    const p = state.player;
    hud.level.textContent = 'Lv.' + p.level;
    hud.hp.style.width = (p.hp / p.maxHp * 100) + '%';
    hud.xp.style.width = clamp((state.xp / state.xpNeeded) * 100, 0, 100) + '%';
    hud.score.textContent = String(state.score).padStart(4, '0');
    hud.levelName.textContent = 'Level ' + (state.currentLevel + 1) + ' — ' + currentLevel().name;
  }


  // ────────────────────────────────────────────────────────────────────
  // MODULE 13: BATTLE STATE MACHINE
  // ────────────────────────────────────────────────────────────────────

  /**
   * Transition from overworld → battle.
   * `mapEnemy` is a reference to the enemy object in the current map's
   * enemies array.  We clone its stats so the map data stays clean.
   */
  function startBattle(mapEnemy) {
    state.mode = 'battle';
    const template = BOSS_TYPES[mapEnemy.type];
    const isBoss = mapEnemy.boss;
    const level = state.currentLevel + 1;

    // Build enemy stats: boss uses template directly, minion scales
    const enemy = isBoss
      ? {
          name: template.name, emoji: template.emoji, color: template.color,
          hp: template.hp, maxHp: template.hp,
          attack: template.attack, defense: template.defense,
          xpReward: template.xpReward, scoreReward: template.scoreReward,
          tier: template.tier, isBoss: true,
        }
      : createMinion(level);

    state.battle = { mapEnemyRef: mapEnemy, enemy, isBoss,
      playerHp: state.player.hp, playerMaxHp: state.player.maxHp,
      answered: false, turnLock: false,
    };

    hudEl.classList.add('hidden');
    mobileCtrl.classList.add('hidden');
    battleUI.classList.add('active');
    hideSubMenu();

    const label = isBoss ? '<span style="color:#FFD700">BOSS</span> ' : '';
    const zoneName = level <= 3 ? 'Altcoin Swamp' : level <= 7 ? 'Fiat Factory' : 'The Citadel';
    setBattleLog(label + 'A wild <span class="highlight">' + enemy.name + '</span> appeared!<br><span style="color:rgba(255,255,255,.4);font-size:7px;">[' + zoneName + ']</span>');
    showMainActions();
  }

  function endBattle(won) {
    state.mode = 'overworld';
    battleUI.classList.remove('active');
    hudEl.classList.remove('hidden');
    mobileCtrl.classList.remove('hidden');

    if (won) {
      state.battle.mapEnemyRef.defeated = true;
      if (state.battle.isBoss) {
        state.portalVisible = true;
        // Portal visual appears on the map — walk into it to advance
      }
    }

    state.battle = null;
  }

  function victory() {
    state.gameOver = true;
    setBattleLog(
      '<span class="heal" style="font-size:14px;">🏆 YOU BEAT BITCOIN QUEST! 🏆</span><br>' +
      '<span style="color:#FFD700;">Score: ' + state.score + '</span><br>' +
      '<span style="color:rgba(255,255,255,.4);font-size:7px;">The FED has been defeated. Sound money prevails!</span>'
    );
    battleUI.classList.add('active');
    const actions = document.getElementById('battleActions');
    actions.style.display = 'flex';
    actions.innerHTML = '<button class="battle-btn primary" onclick="restartGame()">🔄 Play Again</button>';
  }

  /** Show the main action buttons (Attack / Items / Run). */
  function showMainActions() {
    battleActions.style.display = 'flex';
    battleSub.classList.remove('active');
    battleAnswers.classList.remove('active');
    document.getElementById('btnAttack').disabled = false;
    document.getElementById('btnItems').disabled = false;
    document.getElementById('btnRun').disabled = false;
  }

  /** Hide the sub-menu (items / answers). */
  function hideSubMenu() {
    battleSub.classList.remove('active');
    battleAnswers.classList.remove('active');
    showMainActions();
  }

  /** Write text into the battle log panel. */
  function setBattleLog(html) {
    battleLog.innerHTML = html;
  }


  // ────────────────────────────────────────────────────────────────────
  // MODULE 14: BATTLE ACTIONS
  // ────────────────────────────────────────────────────────────────────

  function battleAction(action) {
    if (state.battle.turnLock || state.battle.answered) return;

    switch (action) {
      case 'attack':  doAttack();  break;
      case 'items':   showItems(); break;
      case 'run':     doRun();     break;
    }
  }

  /* ── Attack (Power Move Quiz) ──────────────────────────────────── */

  function doAttack() {
    const tier = state.battle.enemy.tier;
    const pool = BTC_QUESTIONS.filter(q => q.tier === tier);
    const q = pool.length > 0 ? pool[rand(0, pool.length - 1)] : BTC_QUESTIONS[rand(0, BTC_QUESTIONS.length - 1)];
    const powerMove = POWER_MOVES[rand(0, POWER_MOVES.length - 1)];
    const counterMove = COUNTER_MOVES[rand(0, COUNTER_MOVES.length - 1)];

    state.battle.currentQ = q;
    state.battle.powerMove = powerMove;
    state.battle.counterMove = counterMove;
    state.battle.answered = true;

    battleActions.style.display = 'none';
    battleAnswers.classList.add('active');
    battleAnswers.innerHTML = '';

    setBattleLog(
      '<span style="color:#F7931A;font-size:8px;">⚡ ' + powerMove + '</span><br>' +
      '<span style="color:rgba(255,255,255,.8);font-size:7px;">' + q.q + '</span>'
    );

    const labels = ['A', 'B', 'C', 'D'];
    q.a.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'ans-btn';
      btn.innerHTML = '<span style="color:#F7931A;font-weight:bold;">' + labels[i] + '.</span> ' + opt;
      btn.onclick = () => handleAnswer(i, q);
      battleAnswers.appendChild(btn);
    });
  }

  function handleAnswer(chosenIdx, q) {
    const btns = battleAnswers.querySelectorAll('.ans-btn');
    btns.forEach(b => b.disabled = true);

    const correct = chosenIdx === q.c;
    btns[q.c].classList.add('correct');
    if (!correct) btns[chosenIdx].classList.add('wrong');

    state.battle.turnLock = true;

    if (correct) {
      const rawDmg = state.player.attack * 3 + rand(5, 15);
      const finalDmg = Math.max(1, rawDmg - state.battle.enemy.defense);
      state.battle.enemy.hp = Math.max(0, state.battle.enemy.hp - finalDmg);

      setBattleLog(
        '<span style="color:#00D4AA;">✓ Correct!</span><br>' +
        '<span class="highlight">' + state.battle.powerMove + '</span> ' +
        '<span class="damage">-' + finalDmg + ' HP</span>'
      );

      setTimeout(() => {
        if (state.battle.enemy.hp <= 0) {
          setBattleLog('<span class="heal">' + state.battle.enemy.name + ' defeated!</span>');
          const xpG = state.battle.enemy.xpReward;
          const scG = state.battle.enemy.scoreReward;
          state.xp += xpG;
          state.score += scG;
          state.player.hp = state.battle.playerHp;
          if (state.xp >= state.xpNeeded) levelUp();
          setTimeout(() => endBattle(true), 1200);
          return;
        }
        enemyTurn();
      }, 1000);

    } else {
      const rawDmg = state.battle.enemy.attack * 2 + rand(2, 5);
      const finalDmg = Math.max(1, rawDmg - state.player.defense);
      state.battle.playerHp = Math.max(0, state.battle.playerHp - finalDmg);
      state.player.hp = state.battle.playerHp;

      setBattleLog(
        '<span style="color:#FF4757;">✗ Wrong!</span> ' +
        '<span style="color:rgba(255,255,255,.5);font-size:7px;">(' + q.a[q.c] + ')</span><br>' +
        '<span class="damage">' + state.battle.counterMove + '</span> hits you for <span class="damage">-' + finalDmg + ' HP</span>'
      );

      if (state.battle.playerHp <= 0) {
        setTimeout(() => {
          setBattleLog('You fainted... <span class="damage">Game Over</span>');
          setTimeout(() => gameOver(), 1500);
        }, 800);
        return;
      }

      setTimeout(() => {
        enemyTurn();
      }, 1000);
    }
  }

  /* ── Enemy Turn ─────────────────────────────────────────────────── */

  function enemyTurn() {
    const eAtk = state.battle.enemy.attack + rand(0, 2);
    const pDef = state.player.defense;
    const dmg = Math.max(1, eAtk - pDef);

    state.battle.playerHp = Math.max(0, state.battle.playerHp - dmg);
    state.player.hp = state.battle.playerHp;

    setBattleLog(state.battle.enemy.name + ' attacks! <span class="damage">-' + dmg + ' HP</span>');

    if (state.battle.playerHp <= 0) {
      setTimeout(() => {
        setBattleLog('You fainted... <span class="damage">Game Over</span>');
        setTimeout(() => gameOver(), 1500);
      }, 800);
      return;
    }

    // Re-enable player turn
    setTimeout(() => {
      state.battle.answered = false;
      state.battle.turnLock = false;
      showMainActions();
      setBattleLog('What will you do?');
    }, 1000);
  }

  /* ── Items ──────────────────────────────────────────────────────── */

  let playerItems = { potion: 3, superpotion: 1 };

  function showItems() {
    battleActions.style.display = 'none';
    battleSub.classList.add('active');
    setBattleLog('Use an item:');
  }

  function useItem(type) {
    if (playerItems[type] <= 0) {
      setBattleLog('No ' + type + 's left!');
      return;
    }

    const healAmt = type === 'potion' ? 20 : 50;
    playerItems[type]--;

    const before = state.battle.playerHp;
    state.battle.playerHp = Math.min(state.battle.playerMaxHp, state.battle.playerHp + healAmt);
    state.player.hp = state.battle.playerHp;
    const actualHeal = state.battle.playerHp - before;

    setBattleLog('Used ' + type + '! <span class="heal">+' + actualHeal + ' HP</span>');
    state.battle.turnLock = true;

    setTimeout(() => {
      enemyTurn();
    }, 1000);
  }

  /* ── Run ────────────────────────────────────────────────────────── */

  function doRun() {
    const chance = rand(1, 100);
    if (chance <= 60) {
      setBattleLog('You fled successfully!');
      state.battle.turnLock = true;
      setTimeout(() => {
        endBattle(false);
      }, 800);
    } else {
      setBattleLog('Failed to escape!');
      state.battle.turnLock = true;
      setTimeout(() => {
        enemyTurn();
      }, 800);
    }
  }


  // ────────────────────────────────────────────────────────────────────
  // MODULE 15: LEVEL UP
  // ────────────────────────────────────────────────────────────────────

  function levelUp() {
    state.xp = 0;
    state.xpNeeded = Math.round(state.xpNeeded * 1.35);
    state.player.level++;
    state.player.maxHp += 8;
    state.player.hp = state.player.maxHp;
    state.player.attack += 2;
    state.player.defense += 1;

    setBattleLog('<span class="heal">Level Up! Lv.' + state.player.level + '</span>');
    setBattleLog('<span class="heal">HP +8 | ATK +2 | DEF +1</span>');
    // Restore full HP on level up
    state.battle.playerHp = state.player.maxHp;
    state.battle.playerMaxHp = state.player.maxHp;
  }


  // ────────────────────────────────────────────────────────────────────
  // MODULE 16: BATTLE RENDERER (drawn on canvas behind the HTML overlay)
  // ────────────────────────────────────────────────────────────────────

  function renderBattle() {
    const b = state.battle;
    if (!b) return;

    // Background
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a0a2e');
    grad.addColorStop(0.5, '#0b0b1a');
    grad.addColorStop(1, '#0a0a0a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Grid lines for retro feel
    ctx.strokeStyle = 'rgba(255,255,255,.02)';
    ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 32) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
    }
    for (let i = 0; i < H; i += 32) {
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
    }

    // ── Enemy (top-right area) ──
    const ex = 400, ey = 50;

    // Enemy sprite
    ctx.fillStyle = 'rgba(0,0,0,.2)';
    ctx.beginPath();
    ctx.ellipse(ex + 32, ey + 50, 30, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = b.enemy.color;
    ctx.fillRect(ex + 12, ey + 20, 40, 30); // body

    ctx.fillStyle = b.enemy.color;
    ctx.fillRect(ex + 16, ey + 4, 32, 24); // head

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(ex + 20, ey + 10, 8, 8);
    ctx.fillRect(ex + 36, ey + 10, 8, 8);
    ctx.fillStyle = '#222';
    ctx.fillRect(ex + 22, ey + 12, 4, 4);
    ctx.fillRect(ex + 38, ey + 12, 4, 4);

    // Mouth
    ctx.fillStyle = '#333';
    ctx.fillRect(ex + 24, ey + 22, 16, 4);

    // Enemy HP bar (above sprite)
    const eBarX = ex + 4, eBarY = ey - 18, eBarW = 56, eBarH = 8;
    ctx.fillStyle = 'rgba(0,0,0,.6)';
    ctx.fillRect(eBarX - 1, eBarY - 1, eBarW + 2, eBarH + 2);
    const eHpPct = b.enemy.hp / b.enemy.maxHp;
    ctx.fillStyle = eHpPct > 0.5 ? '#00D4AA' : eHpPct > 0.25 ? '#FFD700' : '#FF4757';
    ctx.fillRect(eBarX, eBarY, eBarW * eHpPct, eBarH);

    ctx.font = '6px "Press Start 2P", monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#fff';
    ctx.fillText(b.enemy.name, ex + 4, eBarY - 6);
    if (b.isBoss) {
      ctx.fillStyle = '#FFD700';
      ctx.font = '5px "Press Start 2P", monospace';
      ctx.fillText('★ BOSS', ex + 4, eBarY + 28);
    }
    ctx.fillStyle = 'rgba(255,255,255,.3)';
    ctx.font = '5px "Press Start 2P", monospace';
    const zoneName = state.currentLevel <= 2 ? 'Altcoin Swamp' : state.currentLevel <= 6 ? 'Fiat Factory' : 'The Citadel';
    ctx.fillText('[' + zoneName + ']', ex + 4, eBarY + 14);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,.4)';
    ctx.fillText(b.enemy.hp + '/' + b.enemy.maxHp, ex + eBarW, eBarY - 6);

    // ── Player (bottom-left area) ──
    const px = 80, py = 280;

    // Player sprite
    ctx.fillStyle = 'rgba(0,0,0,.2)';
    ctx.beginPath();
    ctx.ellipse(px + 32, py + 50, 30, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = CONFIG.PLAYER_COLOR;
    ctx.fillRect(px + 20, py + 30, 24, 20);
    ctx.fillStyle = 'rgba(255,255,255,.12)';
    ctx.fillRect(px + 24, py + 34, 8, 12);

    ctx.fillStyle = '#F5C89A';
    ctx.beginPath();
    ctx.arc(px + 32, py + 20, 14, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#222';
    ctx.fillRect(px + 24, py + 16, 4, 4);
    ctx.fillRect(px + 36, py + 16, 4, 4);

    ctx.fillStyle = '#2C3E50';
    ctx.fillRect(px + 20, py + 50, 10, 12);
    ctx.fillRect(px + 34, py + 50, 10, 12);

    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.fillText('\u20BF', px + 32, py + 8);

    // Player HP bar
    const pBarX = px, pBarY = py - 18, pBarW = 64, pBarH = 8;
    ctx.fillStyle = 'rgba(0,0,0,.6)';
    ctx.fillRect(pBarX - 1, pBarY - 1, pBarW + 2, pBarH + 2);
    const pHpPct = b.playerHp / b.playerMaxHp;
    ctx.fillStyle = pHpPct > 0.5 ? '#00D4AA' : pHpPct > 0.25 ? '#FFD700' : '#FF4757';
    ctx.fillRect(pBarX, pBarY, pBarW * pHpPct, pBarH);

    ctx.textAlign = 'left';
    ctx.font = '6px "Press Start 2P", monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText('Bitcoin Maxie', pBarX, pBarY - 6);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,.4)';
    ctx.fillText(b.playerHp + '/' + b.playerMaxHp, pBarX + pBarW, pBarY - 6);

    // Level badge
    ctx.textAlign = 'center';
    ctx.fillStyle = '#F7931A';
    ctx.font = '8px "Press Start 2P", monospace';
    ctx.fillText('Lv.' + state.player.level, px + 32, py + 76);
  }


  // ────────────────────────────────────────────────────────────────────
  // MODULE 17: GAME OVER
  // ────────────────────────────────────────────────────────────────────

  function gameOver() {
    state.gameOver = true;
    setBattleLog('<span class="damage">GAME OVER</span> — Score: ' + state.score);
    // Show restart option
    const actions = document.getElementById('battleActions');
    actions.style.display = 'flex';
    actions.innerHTML = '<button class="battle-btn primary" onclick="restartGame()">🔄 Play Again</button>';
    document.getElementById('battleSub').classList.remove('active');
    document.getElementById('battleAnswers').classList.remove('active');
  }

  function restartGame() {
    state.gameOver = false;
    state.player.hp = 40;
    state.player.maxHp = 40;
    state.player.level = 1;
    state.player.attack = 8;
    state.player.defense = 2;
    state.xp = 0;
    state.xpNeeded = 50;
    state.score = 0;
    playerItems = { potion: 3, superpotion: 1 };

    // Reset all enemies across all levels
    LEVELS.forEach(lv => {
      lv.enemies.forEach(e => { e.defeated = false; });
    });

    document.getElementById('battleActions').innerHTML =
      '<button class="battle-btn primary" id="btnAttack" onclick="battleAction(\'attack\')">⚔ Attack</button>' +
      '<button class="battle-btn" id="btnItems" onclick="battleAction(\'items\')">🧪 Items</button>' +
      '<button class="battle-btn danger" id="btnRun" onclick="battleAction(\'run\')">🏃 Run</button>';

    loadLevel(0);
    state.mode = 'overworld';
    battleUI.classList.remove('active');
    hudEl.classList.remove('hidden');
    mobileCtrl.classList.remove('hidden');
  }


  // ────────────────────────────────────────────────────────────────────
  // MODULE 18: GAME LOOP
  // ────────────────────────────────────────────────────────────────────

  let lastTime = 0;

  function gameLoop(timestamp) {
    const dt = timestamp - lastTime;
    lastTime = timestamp;

    if (state.mode === 'overworld') {
      if (state.moving) {
        state.moveTimer += dt;
        const t = Math.min(state.moveTimer / CONFIG.MOVE_COOLDOWN, 1);
        const targetX = state.player.gridX * CONFIG.TILE_SIZE;
        const targetY = state.player.gridY * CONFIG.TILE_SIZE;
        state.player.pixelX += (targetX - state.player.pixelX) * 0.3;
        state.player.pixelY += (targetY - state.player.pixelY) * 0.3;
        if (t >= 1) {
          state.player.pixelX = targetX;
          state.player.pixelY = targetY;
          state.moving = false;
        }
      }

      if (!state.moving && !state.gameOver) {
        const k = state.keys;
        if (k['ArrowUp']    || k['w'] || k['W']) tryMove(0, -1);
        if (k['ArrowDown']  || k['s'] || k['S']) tryMove(0,  1);
        if (k['ArrowLeft']  || k['a'] || k['A']) tryMove(-1, 0);
        if (k['ArrowRight'] || k['d'] || k['D']) tryMove(1,  0);
      }
    }

    render();
    requestAnimationFrame(gameLoop);
  }


  // ────────────────────────────────────────────────────────────────────
  // MODULE 19: BOOT
  // ────────────────────────────────────────────────────────────────────

  loadLevel(0);
  requestAnimationFrame(gameLoop);

  console.log('Bitcoin Quest — Phase 5: 10-Level Progression');
  console.log('Defeat all minions + boss on each level to open the portal.');
  console.log('10 levels, 3 zones: Altcoin Swamp → Fiat Factory → The Citadel');
  console.log('Final boss: The Federal Reserve Chairman — sound money prevails!');
</script>
